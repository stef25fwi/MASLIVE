name: Apply MapMarket Preload

on:
  workflow_dispatch:
  push:
    branches:
      - perf/preload-mapmarket-catalog

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: perf/preload-mapmarket-catalog
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: python3 scripts/patch-preload-mapmarket-catalog.py
      - name: Format Dart
        working-directory: app
        run: dart format lib/services/market_map_service.dart lib/pages/default_map_page.dart
      - name: Remove temporary files
        run: |
          rm -f scripts/patch-preload-mapmarket-catalog.py
          rm -f .github/workflows/apply-preload-mapmarket-catalog.yml
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/services/market_map_service.dart app/lib/pages/default_map_page.dart scripts/patch-preload-mapmarket-catalog.py .github/workflows/apply-preload-mapmarket-catalog.yml
          git commit -m "perf: preload MapMarket selector catalog"
          git push origin HEAD:perf/preload-mapmarket-catalog
