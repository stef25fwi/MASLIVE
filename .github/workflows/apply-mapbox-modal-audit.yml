name: Apply Mapbox Modal Pointer Audit

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: mapbox-modal-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'fix/mapbox-modal-pointer-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Mapbox modal audit branch
        uses: actions/checkout@v4
        with:
          ref: fix/mapbox-modal-pointer-audit
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply Mapbox modal pointer protections
        run: python3 scripts/apply_mapbox_modal_pointer_audit.py

      - name: Format protected sources
        run: |
          dart format \
            app/lib/ui/widgets/polaroid_poi_sheet.dart \
            app/lib/ui/widgets/marketmap_poi_selector_sheet.dart \
            app/lib/admin/poi_edit_popup.dart \
            app/lib/admin/circuit_map_editor.dart \
            app/lib/admin/circuit_wizard_entry_page.dart \
            app/test/mapbox_modal_pointer_audit_test.dart

      - name: Capture Flutter analyze report
        id: analyze
        working-directory: app
        shell: bash
        run: |
          set +e
          flutter analyze --fatal-infos --fatal-warnings 2>&1 | tee ../MAPBOX_MODAL_ANALYZE.md
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish transformed sources and analyzer report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            MAPBOX_MODAL_ANALYZE.md \
            app/lib/ui/widgets/polaroid_poi_sheet.dart \
            app/lib/ui/widgets/marketmap_poi_selector_sheet.dart \
            app/lib/admin/poi_edit_popup.dart \
            app/lib/admin/circuit_map_editor.dart \
            app/lib/admin/circuit_wizard_entry_page.dart \
            app/test/mapbox_modal_pointer_audit_test.dart
          if git diff --cached --quiet; then
            echo "Aucun changement Mapbox à publier."
          else
            git commit -m "fix(mapbox): apply modal pointer protections"
            git push origin HEAD:fix/mapbox-modal-pointer-audit
          fi

      - name: Enforce Flutter analyze
        run: test "${{ steps.analyze.outputs.status }}" = "0"

      - name: Pointer interception tests
        working-directory: app
        run: |
          flutter test \
            test/mapbox_modal_pointer_audit_test.dart \
            test/admin/parking_style_sheet_pointer_test.dart \
            test/ui_kit/responsive/responsive_breakpoints_test.dart
