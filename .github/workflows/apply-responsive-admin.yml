name: Apply Responsive Administration Conversion

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: responsive-admin-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'responsive/administration'
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout administration responsive branch
        uses: actions/checkout@v4
        with:
          ref: responsive/administration
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply responsive administration conversion
        run: python3 scripts/apply_responsive_admin.py

      - name: Format administration sources
        run: |
          dart format \
            app/lib/admin/admin_main_dashboard.dart \
            app/lib/admin/admin_analytics_page.dart \
            app/lib/admin/admin_orders_page.dart \
            app/lib/admin/tracking_live/tracking_live_page.dart \
            app/lib/admin/circuit_wizard_entry_page.dart \
            app/test/admin/responsive_admin_contract_test.dart

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Administration responsive tests
        working-directory: app
        run: |
          flutter test \
            test/admin/responsive_admin_contract_test.dart \
            test/ui_kit/responsive/responsive_breakpoints_test.dart \
            test/profile_capability_consistency_test.dart

      - name: Commit validated administration conversion
        run: |
          if git diff --quiet; then
            echo "Aucun changement administration responsive à publier."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/admin/admin_main_dashboard.dart \
            app/lib/admin/admin_analytics_page.dart \
            app/lib/admin/admin_orders_page.dart \
            app/lib/admin/tracking_live/tracking_live_page.dart \
            app/lib/admin/circuit_wizard_entry_page.dart \
            app/test/admin/responsive_admin_contract_test.dart
          git commit -m "feat(responsive): adapt administration layouts"
          git push origin HEAD:responsive/administration
