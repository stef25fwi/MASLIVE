name: Harden Priority Flow Owner Role

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/harden-priority-flow-owner-role.yml
      - scripts/harden_priority_flow_owner_role.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: harden-priority-flow-owner-role
  cancel-in-progress: true

jobs:
  harden-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-priority-user-flows
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Apply owner role hardening
        run: python3 scripts/harden_priority_flow_owner_role.py

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run Functions tests
        working-directory: functions
        run: npm test

      - name: Commit validated hardening
        run: |
          if git diff --quiet; then
            echo "Owner role hardening already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            functions/src/commerce-submissions.js \
            functions/test/commerce-submissions.test.js \
            firestore.rules
          git commit -m "Harden seller owner role authorization"
          git push origin HEAD:agent/unify-priority-user-flows
