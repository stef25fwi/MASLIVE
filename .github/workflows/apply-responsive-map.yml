name: Apply Responsive Map Conversion

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: responsive-map-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'responsive/map-exploration'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout map responsive branch
        uses: actions/checkout@v4
        with:
          ref: responsive/map-exploration
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply responsive map conversion
        run: python3 scripts/apply_responsive_map.py

      - name: Format responsive map sources
        run: |
          dart format \
            app/lib/pages/default_map_page.dart \
            app/lib/pages/home_map_page_3d.dart \
            app/lib/ui_kit/responsive/responsive.dart \
            app/lib/ui_kit/responsive/responsive_overlay_container.dart \
            app/test/ui_kit/responsive/responsive_overlay_container_test.dart

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Map responsive tests
        working-directory: app
        run: |
          flutter test \
            test/ui_kit/responsive/responsive_breakpoints_test.dart \
            test/ui_kit/responsive/responsive_overlay_container_test.dart

      - name: Commit validated map conversion
        run: |
          if git diff --quiet; then
            echo "Aucun changement carte responsive à publier."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/pages/default_map_page.dart \
            app/lib/pages/home_map_page_3d.dart \
            app/lib/ui_kit/responsive/responsive.dart \
            app/lib/ui_kit/responsive/responsive_overlay_container.dart \
            app/test/ui_kit/responsive/responsive_overlay_container_test.dart
          git commit -m "feat(responsive): constrain map overlays on large screens"
          git push origin HEAD:responsive/map-exploration
