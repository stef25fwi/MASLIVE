name: Finalize Seller Readiness Security

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/finalize-seller-readiness-security.yml
      - scripts/finalize_seller_readiness_security.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-seller-readiness-security
  cancel-in-progress: true

jobs:
  finalize-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-priority-user-flows
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Apply final security patch
        run: python3 scripts/finalize_seller_readiness_security.py

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run Functions tests
        working-directory: functions
        run: npm test

      - name: Commit validated security patch
        run: |
          if git diff --quiet; then
            echo "Seller readiness security already finalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/index.js functions/test/commerce-submissions.test.js
          git commit -m "Finalize seller readiness security"
          git push origin HEAD:agent/unify-priority-user-flows
