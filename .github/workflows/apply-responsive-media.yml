name: Apply Responsive Media Conversion

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: responsive-media-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'responsive/media-gallery'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout media responsive branch
        uses: actions/checkout@v4
        with:
          ref: responsive/media-gallery
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply responsive media conversion
        run: python3 scripts/apply_responsive_media.py

      - name: Format responsive media sources
        run: |
          dart format \
            app/lib/features/shop/pages/media_photo_shop_page.dart \
            app/lib/features/media_marketplace/presentation/pages/media_marketplace_home_page.dart \
            app/lib/features/media_marketplace/presentation/pages/private_media_gallery_page.dart \
            app/lib/features/media_marketplace/presentation/pages/photographer_public_storefront_page.dart

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Media and responsive tests
        working-directory: app
        run: |
          flutter test \
            test/features/media_marketplace/photo_shop_navigation_context_test.dart \
            test/features/media_marketplace/media_marketplace_catalog_scope_test.dart \
            test/features/media_marketplace/presentation/widgets/paginated_media_photo_grid_test.dart \
            test/media_photo_public_preview_test.dart \
            test/ui_kit/responsive/responsive_breakpoints_test.dart

      - name: Commit validated media conversion
        run: |
          if git diff --quiet; then
            echo "Aucun changement média responsive à publier."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/features/shop/pages/media_photo_shop_page.dart \
            app/lib/features/media_marketplace/presentation/pages/media_marketplace_home_page.dart \
            app/lib/features/media_marketplace/presentation/pages/private_media_gallery_page.dart \
            app/lib/features/media_marketplace/presentation/pages/photographer_public_storefront_page.dart
          git commit -m "feat(responsive): adapt media and gallery layouts"
          git push origin HEAD:responsive/media-gallery
