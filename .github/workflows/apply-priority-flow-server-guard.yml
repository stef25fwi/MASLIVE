name: Apply Priority Flow Server Guard

on:
  push:
    branches:
      - agent/unify-priority-user-flows
    paths:
      - .github/workflows/apply-priority-flow-server-guard.yml
      - scripts/apply_priority_flow_server_guard.py
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
    paths:
      - .github/workflows/apply-priority-flow-server-guard.yml
      - scripts/apply_priority_flow_server_guard.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: priority-flow-server-guard
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-priority-user-flows
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply server guard patch
        run: python3 scripts/apply_priority_flow_server_guard.py

      - name: Format Flutter change
        run: dart format app/lib/services/commerce/commerce_service.dart

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run Functions tests
        working-directory: functions
        run: npm test

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: app
        run: flutter analyze

      - name: Run seller readiness Flutter tests
        working-directory: app
        run: flutter test test/services/commerce/seller_publication_readiness_service_test.dart

      - name: Commit validated patch
        run: |
          if git diff --quiet; then
            echo "Server guard already applied; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            functions/index.js \
            functions/src/commerce-submissions.js \
            functions/test/commerce-submissions.test.js \
            app/lib/services/commerce/commerce_service.dart \
            firestore.rules
          git commit -m "Enforce seller payout readiness server-side"
          git push origin HEAD:agent/unify-priority-user-flows
