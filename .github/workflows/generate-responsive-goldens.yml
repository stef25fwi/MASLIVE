name: Generate Responsive Golden References

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: responsive-goldens-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  generate-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'test/responsive-final-matrix'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout responsive validation branch
        uses: actions/checkout@v4
        with:
          ref: test/responsive-final-matrix
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate responsive golden images
        id: goldens
        continue-on-error: true
        working-directory: app
        run: |
          set -o pipefail
          flutter test test/ui_kit/responsive/responsive_golden_test.dart --update-goldens \
            2>&1 | tee test/ui_kit/responsive/golden_generation.txt

      - name: Upload golden generation diagnostic
        if: steps.goldens.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: responsive-golden-diagnostic-${{ github.run_id }}
          path: app/test/ui_kit/responsive/golden_generation.txt
          if-no-files-found: error

      - name: Stop after golden generation failure
        if: steps.goldens.outcome == 'failure'
        run: exit 1

      - name: Verify generated golden images
        working-directory: app
        run: flutter test test/ui_kit/responsive/responsive_golden_test.dart

      - name: Validate responsive matrix and accessibility
        id: matrix
        continue-on-error: true
        working-directory: app
        run: |
          set -o pipefail
          flutter test \
            test/ui_kit/responsive/responsive_viewport_matrix_test.dart \
            test/responsive/full_responsive_page_contract_test.dart \
            2>&1 | tee test/ui_kit/responsive/responsive_validation.txt

      - name: Upload responsive matrix diagnostic
        if: steps.matrix.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: responsive-matrix-diagnostic-${{ github.run_id }}
          path: app/test/ui_kit/responsive/responsive_validation.txt
          if-no-files-found: error

      - name: Stop after responsive matrix failure
        if: steps.matrix.outcome == 'failure'
        run: exit 1

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Commit validated golden references
        run: |
          rm -f \
            app/test/ui_kit/responsive/golden_generation.txt \
            app/test/ui_kit/responsive/responsive_validation.txt
          if git diff --quiet -- app/test/ui_kit/responsive/goldens; then
            echo "Aucune nouvelle référence golden à publier."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/test/ui_kit/responsive/goldens
          git commit -m "test(responsive): add multi-screen golden references"
          git pull --rebase origin test/responsive-final-matrix
          git push origin HEAD:test/responsive-final-matrix
