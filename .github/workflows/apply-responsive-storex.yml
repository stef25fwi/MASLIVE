name: Apply Responsive Storex Conversion

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-responsive-storex-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'workflow_dispatch' || github.head_ref == 'responsive/storex-application')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout conversion branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'responsive/storex-application' }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply responsive boutique conversion
        run: python3 scripts/apply_responsive_storex.py

      - name: Format responsive sources
        run: |
          dart format \
            app/lib/pages/storex_shop_page.dart \
            app/lib/pages/user_facing_shell_page.dart \
            app/lib/pages/user_facing_navigation_rail.dart \
            app/lib/shop/widgets/storex_page_header.dart \
            app/lib/ui_kit/responsive \
            app/test/ui_kit/responsive/responsive_breakpoints_test.dart

      - name: Flutter analyze
        id: analyze
        continue-on-error: true
        working-directory: app
        run: |
          set +e
          flutter analyze --fatal-infos --fatal-warnings 2>&1 | tee ../docs/responsive/STOREX_ANALYZE.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Responsive unit tests
        id: responsive_tests
        continue-on-error: true
        working-directory: app
        run: |
          set +e
          flutter test test/ui_kit/responsive/responsive_breakpoints_test.dart 2>&1 | tee ../docs/responsive/STOREX_TESTS.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Commit conversion snapshot and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/pages/storex_shop_page.dart \
            app/lib/pages/user_facing_shell_page.dart \
            app/lib/pages/user_facing_navigation_rail.dart \
            app/lib/shop/widgets/storex_page_header.dart \
            app/lib/ui_kit/responsive \
            app/test/ui_kit/responsive/responsive_breakpoints_test.dart
          git add -f \
            docs/responsive/STOREX_ANALYZE.log \
            docs/responsive/STOREX_TESTS.log

          if git diff --cached --quiet; then
            echo "Aucun changement responsive à publier."
          else
            git commit -m "feat(responsive): apply Storex conversion snapshot"
            git push origin HEAD:${GITHUB_HEAD_REF:-responsive/storex-application}
          fi

      - name: Enforce validation result
        run: |
          analyze_status='${{ steps.analyze.outputs.status }}'
          test_status='${{ steps.responsive_tests.outputs.status }}'
          if [ "$analyze_status" != "0" ] || [ "$test_status" != "0" ]; then
            echo "Validation responsive en échec: analyze=$analyze_status tests=$test_status"
            exit 1
          fi
