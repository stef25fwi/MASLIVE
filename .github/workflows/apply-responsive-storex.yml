name: Apply Responsive Storex Conversion

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-responsive-storex-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'workflow_dispatch' || github.head_ref == 'responsive/storex-application')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout conversion branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'responsive/storex-application' }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply responsive boutique conversion
        run: python3 scripts/apply_responsive_storex.py

      - name: Format responsive sources
        run: |
          dart format \
            app/lib/pages/storex_shop_page.dart \
            app/lib/pages/user_facing_shell_page.dart \
            app/lib/pages/user_facing_navigation_rail.dart \
            app/lib/shop/widgets/storex_page_header.dart \
            app/lib/ui_kit/responsive \
            app/test/ui_kit/responsive/responsive_breakpoints_test.dart

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Responsive unit tests
        working-directory: app
        run: flutter test test/ui_kit/responsive/responsive_breakpoints_test.dart

      - name: Commit validated responsive conversion
        run: |
          if git diff --quiet; then
            echo "Aucun changement responsive à publier."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/pages/storex_shop_page.dart \
            app/lib/pages/user_facing_shell_page.dart \
            app/lib/pages/user_facing_navigation_rail.dart \
            app/lib/shop/widgets/storex_page_header.dart \
            app/lib/ui_kit/responsive \
            app/test/ui_kit/responsive/responsive_breakpoints_test.dart
          git commit -m "feat(responsive): convert shell and boutique without mobile regression"
          git push origin HEAD:${GITHUB_HEAD_REF:-responsive/storex-application}
