name: Enforce Approval Seller Readiness

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/enforce-approval-seller-readiness.yml
      - scripts/enforce_approval_seller_readiness.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: enforce-approval-seller-readiness
  cancel-in-progress: true

jobs:
  apply-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-priority-user-flows
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Apply approval readiness guard
        run: python3 scripts/enforce_approval_seller_readiness.py

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run Functions tests
        working-directory: functions
        run: npm test

      - name: Commit validated approval guard
        run: |
          if git diff --quiet; then
            echo "Approval readiness guard already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/index.js functions/test/commerce-submissions.test.js
          git commit -m "Revalidate seller readiness before publication"
          git push origin HEAD:agent/unify-priority-user-flows
