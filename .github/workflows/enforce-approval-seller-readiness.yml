name: Enforce Approval Seller Readiness

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/enforce-approval-seller-readiness.yml
      - scripts/enforce_approval_seller_readiness.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: enforce-approval-seller-readiness
  cancel-in-progress: true

jobs:
  apply-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-priority-user-flows
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Apply approval readiness guard
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path('functions/index.js')
          index_text = index_path.read_text(encoding='utf-8')
          guard_signature = 'const sellerReadiness = await createCommerceSubmissionHandlers.evaluateSellerReadiness'
          if guard_signature not in index_text:
              marker = '  // Vérifier les permissions du modérateur'
              if index_text.count(marker) != 1:
                  raise SystemExit(f'marqueur approbation ambigu: {index_text.count(marker)}')
              guard = '''  // Revalide la capacité de reversement au dernier moment. Un compte Stripe
          // peut devenir non payable entre la soumission et la décision du modérateur.
          const sellerReadiness = await createCommerceSubmissionHandlers.evaluateSellerReadiness({
            db,
            uid: submission.ownerUid,
            ownerRole: submission.ownerRole,
          });
          if (!sellerReadiness.ready) {
            throw new HttpsError("failed-precondition", sellerReadiness.message, {
              code: sellerReadiness.code,
              message: sellerReadiness.message,
              actionRoute: sellerReadiness.actionRoute,
            });
          }

          '''
              index_text = index_text.replace(marker, guard + marker, 1)
              index_path.write_text(index_text, encoding='utf-8')

          test_path = Path('functions/test/commerce-submissions.test.js')
          test_text = test_path.read_text(encoding='utf-8')
          assertion = '  assert.match(indexSource, /createCommerceSubmissionHandlers\\.evaluateSellerReadiness/);\n'
          if assertion not in test_text:
              marker = '  assert.match(indexSource, /exports\\.submitCommerceForReview/);\n'
              if test_text.count(marker) != 1:
                  raise SystemExit(f'marqueur test ambigu: {test_text.count(marker)}')
              test_text = test_text.replace(marker, marker + assertion, 1)
              test_path.write_text(test_text, encoding='utf-8')
          PY

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run Functions tests
        working-directory: functions
        run: npm test

      - name: Commit validated approval guard
        run: |
          if git diff --quiet; then
            echo "Approval readiness guard already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/index.js functions/test/commerce-submissions.test.js
          git commit -m "Revalidate seller readiness before publication"
          git push origin HEAD:agent/unify-priority-user-flows
