name: Fix PR59 profile theme contract

on:
  push:
    branches:
      - fix/profile-capability-consistency

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-capability-consistency
          fetch-depth: 0
      - name: Restore the shared secondary text token
        shell: python
        run: |
          from pathlib import Path
          path = Path('app/lib/pages/account_page.dart')
          text = path.read_text()
          if 'MasliveTheme.textSecondary' not in text:
              text = text.replace('MasliveTokens.textMuted', 'MasliveTheme.textSecondary', 1)
          path.write_text(text)
      - name: Commit theme contract fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/pages/account_page.dart
          git commit -m "fix(pr59): rétablit le thème secondaire du profil"
          git push origin HEAD:fix/profile-capability-consistency
