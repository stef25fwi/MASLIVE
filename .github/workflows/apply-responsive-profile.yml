name: Apply Responsive Profile Conversion

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: responsive-profile-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'responsive/profile-account'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout profile responsive branch
        uses: actions/checkout@v4
        with:
          ref: responsive/profile-account
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply responsive profile conversion
        run: python3 scripts/apply_responsive_profile.py

      - name: Format responsive profile sources
        run: |
          dart format \
            app/lib/pages/account_page.dart \
            app/lib/pages/login_page.dart

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Profile and responsive tests
        working-directory: app
        run: |
          flutter test \
            test/profile_capability_consistency_test.dart \
            test/ui_kit/responsive/responsive_breakpoints_test.dart

      - name: Commit validated profile conversion
        run: |
          if git diff --quiet; then
            echo "Aucun changement profil responsive à publier."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/pages/account_page.dart \
            app/lib/pages/login_page.dart
          git commit -m "feat(responsive): adapt profile and login layouts"
          git push origin HEAD:responsive/profile-account
