name: Fix PR59 remaining analyzer names

on:
  push:
    branches:
      - fix/profile-capability-consistency

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/profile-capability-consistency
          fetch-depth: 0
      - name: Rename local accumulator parameters
        shell: python
        run: |
          from pathlib import Path

          finance = Path('app/lib/features/media_marketplace/presentation/widgets/photographer_finance_panel.dart')
          text = finance.read_text()
          text = text.replace('(sum, row) => sum +', '(total, row) => total +')
          text = text.replace('(sum, order) => sum + order.total', '(total, order) => total + order.total')
          text = text.replace('(sum, order) => sum + order.platformFee + order.stripeFee', '(total, order) => total + order.platformFee + order.stripeFee')
          text = text.replace('(sum, order) => sum + order.photographerNetTotal', '(total, order) => total + order.photographerNetTotal')
          finance.write_text(text)

          seller = Path('app/lib/pages/seller/seller_order_detail_page.dart')
          text = seller.read_text()
          text = text.replace('myItems.fold<int>(0, (sum, item) {', 'myItems.fold<int>(0, (total, item) {')
          text = text.replace('return sum + quantity.toInt() * price.toInt();', 'return total + quantity.toInt() * price.toInt();')
          seller.write_text(text)
      - name: Commit focused changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/features/media_marketplace/presentation/widgets/photographer_finance_panel.dart app/lib/pages/seller/seller_order_detail_page.dart
          git commit -m "fix(pr59): renomme les accumulateurs financiers"
          git push origin HEAD:fix/profile-capability-consistency
