name: Photographer media indexes maintenance

on:
  push:
    branches:
      - feat/photographer-gallery-commerce
    paths:
      - .github/workflows/photographer-indexes-maintenance.yml
      - scripts/ensure_photographer_media_indexes.js

permissions:
  contents: write

jobs:
  ensure-indexes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/photographer-gallery-commerce
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add missing photographer indexes
        run: node scripts/ensure_photographer_media_indexes.js
      - name: Commit index updates
        shell: bash
        run: |
          if git diff --quiet -- firestore.indexes.json; then
            echo "Indexes already present"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.indexes.json
          git commit -m "chore(firestore): ajoute les index de la boutique photo"
          git push origin HEAD:feat/photographer-gallery-commerce
