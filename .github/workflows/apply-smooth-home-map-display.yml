name: Apply Smooth Home Map Display

on:
  workflow_dispatch:
  push:
    branches:
      - fix/smooth-home-map-display

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/smooth-home-map-display
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: python3 scripts/patch-smooth-home-map-display.py
      - name: Format Dart
        working-directory: app
        run: dart format lib/pages/user_facing_shell_page.dart
      - name: Remove temporary files
        run: |
          rm -f scripts/patch-smooth-home-map-display.py
          rm -f .github/workflows/apply-smooth-home-map-display.yml
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/pages/user_facing_shell_page.dart scripts/patch-smooth-home-map-display.py .github/workflows/apply-smooth-home-map-display.yml
          git commit -m "fix: smooth home map tab display"
          git push origin HEAD:fix/smooth-home-map-display
