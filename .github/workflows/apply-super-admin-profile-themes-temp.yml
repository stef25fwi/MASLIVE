name: Apply Super Admin Profile Themes Temp

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-super-admin-profile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-validate:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'ux/super-admin-profile-themes'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout profile branch
        uses: actions/checkout@v4
        with:
          ref: ux/super-admin-profile-themes
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply thematic navigation
        run: python3 scripts/apply_super_admin_profile_themes.py

      - name: Format account page
        run: dart format app/lib/pages/account_page.dart

      - name: Verify thematic contract
        run: |
          set -euo pipefail
          file=app/lib/pages/account_page.dart
          grep -q "Administration MASLIVE" "$file"
          grep -q "Compte & préférences" "$file"
          grep -q "Groupes & communauté" "$file"
          grep -q "Création & activité" "$file"
          grep -q "Achats & médias" "$file"
          grep -q "maintainState: true" "$file"
          grep -q "route: '/account-admin'" "$file"
          grep -q "route: '/bloom-art/dashboard'" "$file"
          grep -q "route: '/media-marketplace/photographer'" "$file"
          grep -q "route: '/group-admin'" "$file"

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Flutter tests
        working-directory: app
        run: flutter test

      - name: Commit validated UI
        run: |
          rm -f scripts/apply_super_admin_profile_themes.py
          rm -f .github/workflows/apply-super-admin-profile-themes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "feat(profile): group super admin tools by theme"
          git pull --rebase origin ux/super-admin-profile-themes
          git push origin HEAD:ux/super-admin-profile-themes
