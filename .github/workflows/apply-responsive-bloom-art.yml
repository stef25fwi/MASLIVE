name: Apply Responsive Bloom Art Conversion

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: responsive-bloom-art-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'responsive/bloom-art-extended'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Bloom Art responsive branch
        uses: actions/checkout@v4
        with:
          ref: responsive/bloom-art-extended
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Apply responsive Bloom Art conversion
        run: python3 scripts/apply_responsive_bloom_art.py

      - name: Format Bloom Art responsive sources
        run: |
          dart format \
            app/lib/features/bloom_art/presentation/pages/bloom_art_seller_dashboard_page.dart \
            app/lib/features/bloom_art/presentation/pages/bloom_art_item_create_page.dart \
            app/lib/features/bloom_art/presentation/pages/bloom_art_offer_detail_page.dart \
            app/lib/features/bloom_art/presentation/pages/bloom_art_make_offer_sheet.dart \
            app/test/features/bloom_art/responsive_bloom_art_contract_test.dart

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Bloom Art responsive tests
        working-directory: app
        run: |
          flutter test \
            test/features/bloom_art/responsive_bloom_art_contract_test.dart \
            test/ui_kit/responsive/responsive_breakpoints_test.dart \
            test/profile_capability_consistency_test.dart

      - name: Commit validated Bloom Art conversion
        run: |
          if git diff --quiet; then
            echo "Aucun changement Bloom Art responsive à publier."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/features/bloom_art/presentation/pages/bloom_art_seller_dashboard_page.dart \
            app/lib/features/bloom_art/presentation/pages/bloom_art_item_create_page.dart \
            app/lib/features/bloom_art/presentation/pages/bloom_art_offer_detail_page.dart \
            app/lib/features/bloom_art/presentation/pages/bloom_art_make_offer_sheet.dart \
            app/test/features/bloom_art/responsive_bloom_art_contract_test.dart
          git commit -m "feat(responsive): adapt extended Bloom Art flows"
          git push origin HEAD:responsive/bloom-art-extended
