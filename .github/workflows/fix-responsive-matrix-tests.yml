name: Fix Responsive Matrix Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: fix-responsive-matrix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix-validate-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'test/responsive-final-matrix'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout responsive validation branch
        uses: actions/checkout@v4
        with:
          ref: test/responsive-final-matrix
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Fix matrix assertions and semantics lifecycle
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/test/ui_kit/responsive/responsive_viewport_matrix_test.dart')
          source = path.read_text(encoding='utf-8')

          old_text = "expect(find.text('Largeur ${width.toInt()} px'), findsOneWidget);"
          new_text = "expect(find.textContaining('Largeur ${width.toInt()} px'), findsOneWidget);"
          if old_text in source:
              source = source.replace(old_text, new_text, 1)
          elif new_text not in source:
              raise SystemExit('Width text assertion anchor not found')

          old_semantics = """    testWidgets('primary actions expose meaningful semantics', (tester) async {
      final semantics = tester.ensureSemantics();
      addTearDown(semantics.dispose);
      await _pumpFixture(tester, width: 390, textScale: 1.3);

      final node = tester.getSemantics(
        find.byKey(const Key('primary-action')),
      );
      expect(node.label, contains('Déposer une œuvre'));
      expect(node.hasFlag(SemanticsFlag.isButton), isTrue);
    });
"""
          new_semantics = """    testWidgets('primary actions expose meaningful semantics', (tester) async {
      final semantics = tester.ensureSemantics();
      try {
        await _pumpFixture(tester, width: 390, textScale: 1.3);

        final node = tester.getSemantics(
          find.byKey(const Key('primary-action')),
        );
        expect(node.label, contains('Déposer une œuvre'));
        expect(node.hasFlag(SemanticsFlag.isButton), isTrue);
      } finally {
        semantics.dispose();
      }
    });
"""
          if old_semantics in source:
              source = source.replace(old_semantics, new_semantics, 1)
          elif new_semantics not in source:
              raise SystemExit('Semantics lifecycle anchor not found')

          path.write_text(source, encoding='utf-8')
          PY

      - name: Format responsive matrix test
        run: dart format app/test/ui_kit/responsive/responsive_viewport_matrix_test.dart

      - name: Run responsive matrix and contracts
        working-directory: app
        run: |
          flutter test \
            test/ui_kit/responsive/responsive_viewport_matrix_test.dart \
            test/responsive/full_responsive_page_contract_test.dart

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Commit validated matrix corrections
        run: |
          if git diff --quiet; then
            echo "Matrix test corrections already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/test/ui_kit/responsive/responsive_viewport_matrix_test.dart
          git commit -m "test(responsive): fix matrix text and semantics assertions"
          git pull --rebase origin test/responsive-final-matrix
          git push origin HEAD:test/responsive-final-matrix
