name: Apply SuperAdmin User Management

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/superadmin-user-management-logout'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Apply integration patch
        run: python3 scripts/apply_superadmin_user_management_patch.py

      - name: Remove temporary patch tooling
        run: |
          rm .github/workflows/apply-superadmin-user-management.yml
          rm scripts/apply_superadmin_user_management_patch.py

      - name: Format Dart files
        working-directory: app
        run: |
          dart format \
            lib/admin/superadmin_user_management_page.dart \
            lib/services/superadmin_user_management_service.dart \
            lib/services/auth_service.dart \
            lib/pages/account_page.dart \
            lib/pages/account_admin_page.dart \
            lib/admin/super_admin_space.dart \
            lib/main.dart \
            test/services/superadmin_user_management_service_test.dart

      - name: Validate JavaScript syntax
        working-directory: functions
        run: |
          node -c index.js
          node -c src/superadmin-user-management.js

      - name: Commit generated integration
        run: |
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(admin): branche la console SuperAdmin et corrige la déconnexion'
          git push origin HEAD:${{ github.head_ref }}
