name: Apply Admin Group Flow Unification

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/apply-admin-group-flow-unification.yml
      - scripts/apply_admin_group_flow_unification.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-admin-group-flow-unification
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-priority-user-flows
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply Admin Group flow
        run: python3 scripts/apply_admin_group_flow_unification.py

      - name: Format changed Dart files
        run: |
          dart format \
            app/lib/pages/group/admin_group_dashboard_page.dart \
            app/test/pages/group/admin_group_flow_contract_test.dart

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: app
        run: flutter analyze

      - name: Run Admin Group flow contract test
        working-directory: app
        run: flutter test test/pages/group/admin_group_flow_contract_test.dart

      - name: Commit validated Admin Group flow
        run: |
          if git diff --quiet; then
            echo "Admin Group flow already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/pages/group/admin_group_dashboard_page.dart \
            app/test/pages/group/admin_group_flow_contract_test.dart
          git commit -m "Unify Admin Group tracking flow"
          git push origin HEAD:agent/unify-priority-user-flows
