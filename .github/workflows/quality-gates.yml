name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  flutter-quality:
    name: Flutter Analyze And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        id: flutter_analyze
        continue-on-error: true
        run: |
          set +e
          flutter analyze > flutter-analyze.log 2>&1
          status=$?
          cat flutter-analyze.log

          if grep -Eq '^error •' flutter-analyze.log; then
            exit 1
          fi

          if [ "$status" -ne 0 ] && ! grep -Eq '[0-9]+ issues? found' flutter-analyze.log; then
            exit "$status"
          fi

          exit 0

      - name: Upload Flutter analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-report
          path: app/flutter-analyze.log
          if-no-files-found: error
          retention-days: 7

      - name: Run Flutter tests
        id: flutter_tests
        continue-on-error: true
        run: |
          set +e
          flutter test --reporter expanded > flutter-test.log 2>&1
          status=$?
          echo "=== Résumé des 160 dernières lignes ==="
          tail -n 160 flutter-test.log
          exit "$status"

      - name: Upload Flutter test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-report
          path: app/flutter-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Flutter quality results
        if: steps.flutter_analyze.outcome == 'failure' || steps.flutter_tests.outcome == 'failure'
        run: exit 1

  functions-tests:
    name: Functions Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Run Functions tests
        id: functions_tests
        continue-on-error: true
        run: |
          set +e
          npm test > functions-test.log 2>&1
          status=$?
          echo "=== Résumé des 220 dernières lignes ==="
          tail -n 220 functions-test.log
          exit "$status"

      - name: Upload Functions test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functions-test-report
          path: functions/functions-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Functions test results
        if: steps.functions_tests.outcome == 'failure'
        run: exit 1
