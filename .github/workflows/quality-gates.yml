name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-tracking-consistency:
    name: Apply Tracking Consistency Patch
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/group-tracking-consistency-security'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
          show-progress: false

      - name: Apply consistency patch
        run: |
          set -o pipefail
          python3 scripts/fix_tracking_patch_assertion.py
          python3 scripts/apply_group_tracking_consistency_patch.py 2>&1 | tee patch-apply.log
          python3 scripts/fix_tracking_generated_compat.py 2>&1 | tee -a patch-apply.log

      - name: Upload patch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: group-tracking-patch-report
          path: patch-apply.log
          if-no-files-found: warn
          retention-days: 3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Format Dart changes
        run: |
          dart format \
            app/lib/models/group_tracker.dart \
            app/lib/services/group/group_tracking_service.dart \
            app/lib/pages/group/tracker_group_profile_page.dart \
            app/lib/pages/group/admin_group_dashboard_page.dart

      - name: Validate Flutter
        working-directory: app
        run: |
          flutter pub get
          set +e
          flutter analyze > generated-flutter-validation.log 2>&1
          analyze_status=$?
          cat generated-flutter-validation.log

          if grep -Eq '^error •' generated-flutter-validation.log; then
            exit 1
          fi
          if [ "$analyze_status" -ne 0 ] && ! grep -Eq '[0-9]+ issues? found' generated-flutter-validation.log; then
            exit "$analyze_status"
          fi

          set -o pipefail
          flutter test 2>&1 | tee -a generated-flutter-validation.log

      - name: Upload generated Flutter report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-flutter-validation-report
          path: app/generated-flutter-validation.log
          if-no-files-found: warn
          retention-days: 3

      - name: Validate Functions
        working-directory: functions
        run: |
          npm ci
          node -c group_tracking.js
          npm test

      - name: Validate diff
        run: git diff --check

      - name: Commit generated patch
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "MASLIVE CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(tracking): harmonise présence, sécurité et documentation"
          git push origin HEAD:${{ github.head_ref }}

  flutter-quality:
    name: Flutter Analyze And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        id: flutter_analyze
        continue-on-error: true
        run: |
          set +e
          flutter analyze > flutter-analyze.log 2>&1
          status=$?
          cat flutter-analyze.log

          if grep -Eq '^error •' flutter-analyze.log; then
            exit 1
          fi

          if [ "$status" -ne 0 ] && ! grep -Eq '[0-9]+ issues? found' flutter-analyze.log; then
            exit "$status"
          fi

          exit 0

      - name: Upload Flutter analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-report
          path: app/flutter-analyze.log
          if-no-files-found: error
          retention-days: 7

      - name: Run Flutter tests
        id: flutter_tests
        continue-on-error: true
        run: |
          set +e
          flutter test --reporter expanded > flutter-test.log 2>&1
          status=$?
          echo "=== Résumé des 160 dernières lignes ==="
          tail -n 160 flutter-test.log
          exit "$status"

      - name: Upload Flutter test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-report
          path: app/flutter-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Flutter quality results
        if: steps.flutter_analyze.outcome == 'failure' || steps.flutter_tests.outcome == 'failure'
        run: exit 1

  functions-tests:
    name: Functions Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci

      - name: Run Functions tests
        run: npm test
