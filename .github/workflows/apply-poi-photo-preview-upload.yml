name: Apply POI Photo Preview Upload Fix

on:
  workflow_dispatch:
  push:
    branches:
      - fix/poi-photo-preview-upload

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/poi-photo-preview-upload
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true
      - name: Apply patch
        run: python3 scripts/patch-poi-photo-preview-upload.py
      - name: Format
        run: dart format app/lib/admin/poi_edit_popup.dart app/lib/admin/poi_marketmap_wizard_page.dart app/test/admin/poi_photo_pipeline_test.dart
      - name: Remove temporary files
        run: |
          rm -f scripts/patch-poi-photo-preview-upload.py
          rm -f .github/workflows/apply-poi-photo-preview-upload.yml
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/admin/poi_edit_popup.dart app/lib/admin/poi_marketmap_wizard_page.dart app/test/admin/poi_photo_pipeline_test.dart scripts/patch-poi-photo-preview-upload.py .github/workflows/apply-poi-photo-preview-upload.yml
          git commit -m "fix: fiabilise ajout et aperçu photo POI"
          git push origin HEAD:fix/poi-photo-preview-upload
