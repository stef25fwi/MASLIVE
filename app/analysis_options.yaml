include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Traiter les dépréciations comme warnings (pas erreurs bloquantes)
    deprecated_member_use: warning
    # Traiter les unused imports en warning
    unused_import: warning
    # Détecter les null safety violations
    invalid_null_aware_operator: error
  exclude:
    - _archive/**
    - tooling/**
    - "lib/_legacy/**"
    - "**/*.old"
    - "**/*_legacy.dart"
    - "**/*_backup.dart"
    - "**/*_redirect.dart"
    - "lib/pages/admin_dashboard_page_REMOVED.dart"
