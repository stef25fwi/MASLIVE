include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    deprecated_member_use: warning
    unused_import: warning
    invalid_null_aware_operator: error
    # Les callbacks Flutter imposent parfois plusieurs paramètres volontairement
    # inutilisés (errorBuilder, separatorBuilder). Cette règle purement stylistique
    # ne doit pas faire échouer les quality gates alors que l'analyse et les tests
    # sont techniquement valides.
    unnecessary_underscores: ignore
  exclude:
    - _archive/**
    - tooling/**
    - "lib/_legacy/**"
    - "**/*.old"
    - "**/*_legacy.dart"
    - "**/*_backup.dart"
    - "**/*_redirect.dart"
