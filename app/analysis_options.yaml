include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    deprecated_member_use: warning
    unused_import: warning
    invalid_null_aware_operator: error
    # use_null_aware_elements est un diagnostic SDK (pas un lint rule) — géré ici
    use_null_aware_elements: ignore
  exclude:
    - _archive/**
    - tooling/**
    - "lib/_legacy/**"
    - "**/*.old"
    - "**/*_legacy.dart"
    - "**/*_backup.dart"
    - "**/*_redirect.dart"
    - "lib/pages/admin_dashboard_page_REMOVED.dart"

linter:
  rules:
    use_null_aware_elements: false
