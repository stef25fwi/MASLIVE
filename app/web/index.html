  <!-- Mapbox GL JS v3 (WebGL2). Fallback automatique v2 si WebGL2 indisponible. -->
  <script>
    // Statut de chargement Mapbox GL JS (utile pour diagnostiquer MAPBOXGL_MISSING).
    window.__MAPBOXGL_LOAD_STATUS__ = 'loading';
    // Indique au bridge qu'un fallback de version est en cours (évite une erreur permanente).
    window.__MAPBOXGL_FALLBACKING__ = false;

    (function() {
      const v3Primary = {
        css: 'https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css',
        js: 'https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js',
        label: 'v3-primary',
      };
      const v3Fallback = {
        css: 'https://unpkg.com/mapbox-gl@3.0.1/dist/mapbox-gl.css',
        js: 'https://unpkg.com/mapbox-gl@3.0.1/dist/mapbox-gl.js',
        label: 'v3-fallback',
      };
      const v2Primary = {
        css: 'https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css',
        js: 'https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js',
        label: 'v2-primary',
      };
      const v2Fallback = {
        css: 'https://unpkg.com/mapbox-gl@2.15.0/dist/mapbox-gl.css',
        js: 'https://unpkg.com/mapbox-gl@2.15.0/dist/mapbox-gl.js',
        label: 'v2-fallback',
      };

      function loadCss(href) {
        try {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        } catch (_) {
          // ignore
        }
      }

      function loadJs(src, onload, onerror) {
        try {
          const s = document.createElement('script');
          s.src = src;
          s.async = false;
          s.onload = onload;
          s.onerror = onerror;
          document.head.appendChild(s);
        } catch (_) {
          if (onerror) onerror();
        }
      }

      function markLoaded(label) {
        window.__MAPBOXGL_LOAD_STATUS__ = 'loaded(' + label + ')';
      }

      function markError(label) {
        window.__MAPBOXGL_LOAD_STATUS__ = 'error(' + label + ')';
      }

      function isSupported() {
        try {
          if (window.mapboxgl && typeof window.mapboxgl.supported === 'function') {
            return window.mapboxgl.supported() === true;
          }
        } catch (_) {
          // ignore
        }
        // Si on ne peut pas déterminer, on considère OK pour ne pas bloquer.
        return true;
      }

      function loadV2ThenMark(fromLabel) {
        window.__MAPBOXGL_FALLBACKING__ = true;
        window.__MAPBOXGL_LOAD_STATUS__ = 'fallbacking(' + fromLabel + '->v2)';
        loadCss(v2Primary.css);
        loadJs(
          v2Primary.js,
          function() {
            window.__MAPBOXGL_FALLBACKING__ = false;
            markLoaded(v2Primary.label);
          },
          function() {
            markError(v2Primary.label);
            // Si api.mapbox.com est bloqué, tente unpkg.
            loadCss(v2Fallback.css);
            loadJs(
              v2Fallback.js,
              function() {
                window.__MAPBOXGL_FALLBACKING__ = false;
                markLoaded(v2Fallback.label);
              },
              function() {
                window.__MAPBOXGL_FALLBACKING__ = false;
                markError(v2Fallback.label);
              }
            );
          }
        );
      }

      // Charge v3 (préféré). Si v3 est chargé mais non supporté (WebGL2 absent), bascule sur v2.
      loadCss(v3Primary.css);
      loadJs(
        v3Primary.js,
        function() {
          if (!isSupported()) {
            loadV2ThenMark(v3Primary.label);
            return;
          }
          markLoaded(v3Primary.label);
        },
        function() {
          markError(v3Primary.label);
          // Tentative fallback: utile si un bloqueur cible api.mapbox.com.
          loadCss(v3Fallback.css);
          loadJs(
            v3Fallback.js,
            function() {
              if (!isSupported()) {
                loadV2ThenMark(v3Fallback.label);
                return;
              }
              markLoaded(v3Fallback.label);
            },
            function() {
              markError(v3Fallback.label);
              // Dernier recours: v2 directement.
              loadV2ThenMark('v3-failed');
            }
          );
        }
      );
    })();
  </script>
  
  <script>
    // Fallback legacy uniquement.
    // La source prioritaire doit venir de Dart (MAPBOX_ACCESS_TOKEN -> bridge JS).
    // Ne mets pas de token hardcodé ici.
    window.__MAPBOX_TOKEN__ = "";

    // Style par défaut (ton style "box")
    window.__MAPBOX_STYLE__ = "mapbox://styles/mapbox/streets-v12";
  </script>

  <style id="splash-screen-style">
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      min-height: 100%;
      background-color: #ffffff;
      background-size: 100% 100%;
    }

    /* Assure que le conteneur Flutter occupe toujours toute la fenêtre */
    #flutter_view,
    flutter-view,
    flt-glass-pane {
      width: 100% !important;
      height: 100% !important;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    /* Loading spinner animation */
    .loader {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #FF6FB1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: translateX(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) rotate(360deg); }
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    /* Mapbox GL JS: décale la barre de zoom sous le compas */
    .mapboxgl-ctrl-top-right .mapboxgl-ctrl-group + .mapboxgl-ctrl-group {
      margin-top: 10px;
    }
  </style>
  <script id="splash-screen-script">
    var _splashRemoved = false;
    function removeSplashFromWeb() {
      if (_splashRemoved) return;
      _splashRemoved = true;
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.getElementById("splash-loader")?.remove();
      document.body.style.background = "transparent";
    }

    // Retire le loader dès que Flutter a rendu la première frame.
    window.addEventListener('flutter-first-frame', function () {
      removeSplashFromWeb();
    });

    // Fallback: si flutter-first-frame ne se déclenche pas dans les 20s,
    // afficher un bouton de rechargement (réseau lent, WASM bloqué, etc.).
    setTimeout(function() {
      if (_splashRemoved) return;
      var loader = document.getElementById("splash-loader");
      if (!loader) return;
      loader.style.animation = 'none';
      loader.style.border = 'none';
      var btn = document.createElement('div');
      btn.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-family:sans-serif;';
      btn.innerHTML = '<p style="color:#888;margin-bottom:16px;font-size:14px">MASLIVE prend trop de temps à charger.</p>'
        + '<button onclick="location.reload(true)" style="padding:12px 28px;background:#FF6FB1;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600">↺ Recharger</button>';
      document.body.appendChild(btn);
    }, 20000);

    // Rechargement automatique quand le service worker est mis à jour.
    // Garantit que les utilisateurs obtiennent toujours la dernière version déployée.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!_splashRemoved) {
          // SW mis à jour pendant le chargement initial -> recharger
          location.reload();
        }
      });
    }
  </script>
</head>
<body>
  <!-- Splash natif blanc avec loader uniquement -->
  <div id="splash-loader" class="loader"></div>
